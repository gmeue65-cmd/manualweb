require_once __DIR__ . '/vendor/autoload.php';

// Cargar variables de entorno
$dotenv = Dotenv\Dotenv::createImmutable(__DIR__);
$dotenv->load();

class EuniprincezDB {
    private $pdo;

    public function __construct() {
        $dsn = "mysql:host={$_ENV['DB_HOST']};dbname={$_ENV['DB_NAME']};charset=utf8mb4";
        
        $options = [
            PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
            PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
            PDO::ATTR_EMULATE_PREPARES => false,
            // SSL reforzado, verificar que la ruta sea absoluta y segura
            PDO::MYSQL_ATTR_SSL_KEY => $_ENV['SSL_KEY_PATH'],
        ];

        try {
            $this->pdo = new PDO(
                $dsn,
                $_ENV['DB_USER'],
                $_ENV['DB_PASS'],
                $options
            );
        } catch (\PDOException $e) {
            // Loguear el error real en un archivo privado, no mostrarlo
            error_log($e->getMessage());
            die("Error de Seguridad: Acceso Denegado a Euniprincez Digital.");
        }
    }

    /**
     * Valida un Token de 256 bits (64 hex chars) contra la BD usando tiempo constante
     */
    public function validarToken($userId, $tokenRecibidoHex) {
        // 1. Verificar longitud exacta (64 caracteres hexadecimales = 256 bits)
        if (strlen($tokenRecibidoHex) !== 64 || !ctype_xdigit($tokenRecibidoHex)) {
            return false;
        }

        $stmt = $this->pdo->prepare("SELECT token_hex FROM sesiones WHERE user_id = ? AND activa = 1");
        $stmt->execute([$userId]);
        $storedToken = $stmt->fetchColumn();

        // 2. hash_equals protege contra ataques de tiempo
        if ($storedToken && hash_equals($storedToken, $tokenRecibidoHex)) {
            return true;
        }

        return false;
    }
}

